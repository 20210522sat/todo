
<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>共享代辦清單</title>
<link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="代辦清單">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Helvetica Neue",sans-serif;background:#f5f5f0;min-height:100vh;display:flex;justify-content:center;padding:2rem 1rem}
.card{background:#fff;border-radius:16px;border:1px solid #e5e5e0;padding:1.5rem;width:100%;max-width:520px;height:fit-content}

.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;gap:8px}
.app-title{font-size:18px;font-weight:500;color:#111}
.add-group-btn{height:32px;padding:0 14px;border:1px solid #ddd;border-radius:8px;background:#fff;color:#666;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:5px;font-family:inherit}
.add-group-btn:hover{background:#f5f5f0}

.sync-bar{display:flex;align-items:center;gap:6px;margin-bottom:1rem;font-size:12px;color:#999}
.dot{width:7px;height:7px;border-radius:50%;background:#ccc;flex-shrink:0;transition:background 0.3s}
.dot.online{background:#639922}
.dot.error{background:#e24b4a}

.name-row{display:flex;align-items:center;gap:8px;margin-bottom:1.25rem}
.name-label{font-size:13px;color:#999;white-space:nowrap}
input[type=text]{border:1px solid #ddd;border-radius:8px;font-size:13px;outline:none;color:#111;background:#fff;font-family:inherit}
input[type=text]:focus{border-color:#999}
.name-input{height:30px;padding:0 10px;width:130px}

/* 群組折疊 */
.group{margin-bottom:8px;border:1px solid #f0f0ee;border-radius:12px;overflow:hidden}
.group-header{display:flex;align-items:center;gap:8px;padding:10px 12px;cursor:pointer;background:#fafaf8;user-select:none}
.group-header:hover{background:#f5f4f0}
.chevron{width:16px;height:16px;flex-shrink:0;transition:transform 0.2s;color:#bbb}
.group.open .chevron{transform:rotate(90deg)}
.group-title{font-size:15px;font-weight:500;color:#111;background:transparent;border:1px solid transparent;border-radius:6px;outline:none;flex:1;padding:2px 4px;font-family:inherit;cursor:text}
.group-title:hover{border-color:#e0e0dc;background:#fff}
.group-title:focus{border-color:#ccc;background:#fff}
.group-badge{font-size:11px;color:#aaa;background:#ececea;padding:1px 7px;border-radius:10px;white-space:nowrap;flex-shrink:0}
.group-badge.all-done{background:#eaf3de;color:#3b6d11}
.del-group-btn{width:22px;height:22px;border:none;background:transparent;color:#ccc;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;border-radius:4px;flex-shrink:0;font-family:inherit}
.del-group-btn:hover{background:#fff0f0;color:#c00}

.group-mini-bar{height:3px;background:#efefeb;overflow:hidden}
.group-mini-fill{height:100%;background:#639922;transition:width 0.35s}

.group-body{display:none;padding:10px 12px 12px}
.group.open .group-body{display:block}

.todo-list{display:flex;flex-direction:column;gap:5px;margin-bottom:8px}
.todo-item{display:flex;align-items:center;gap:9px;padding:8px 10px;background:#fff;border:1px solid #f0f0ee;border-radius:8px;transition:opacity 0.2s}
.todo-item.done{opacity:0.42}
.todo-item.done .todo-text{text-decoration:line-through;color:#bbb}
.check-btn{width:19px;height:19px;border-radius:50%;border:1.5px solid #ccc;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:0}
.check-btn.checked{background:#eaf3de;border-color:#639922}
.check-icon{width:9px;height:9px;stroke:#3b6d11;stroke-width:2.5;fill:none;display:none}
.check-btn.checked .check-icon{display:block}
.todo-text{flex:1;font-size:13px;color:#111;word-break:break-all;line-height:1.4}
.item-meta{font-size:11px;color:#ccc;flex-shrink:0}
.del-item-btn{width:20px;height:20px;border:none;background:transparent;color:#ccc;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;border-radius:4px;flex-shrink:0;padding:0;font-family:inherit}
.del-item-btn:hover{background:#fff0f0;color:#c00}

.add-item-row{display:flex;gap:6px;margin-bottom:10px}
.add-item-input{flex:1;height:32px;padding:0 10px;font-size:13px;border-radius:8px}
.add-item-btn{height:32px;padding:0 12px;border:1px solid #ddd;border-radius:8px;background:#fff;color:#666;font-size:13px;cursor:pointer;white-space:nowrap;font-family:inherit}
.add-item-btn:hover{background:#f5f5f0}

.group-note-wrap{border-top:1px solid #f0f0ee;padding-top:10px}
.group-note-label{font-size:11px;color:#bbb;margin-bottom:5px}
textarea.group-note{width:100%;min-height:50px;padding:7px 10px;border:1px solid #eee;border-radius:8px;font-size:13px;color:#111;background:#fafaf8;font-family:inherit;resize:vertical;outline:none;line-height:1.6}
textarea.group-note:focus{border-color:#999;background:#fff}
textarea.group-note::placeholder{color:#ccc}
.group-note-meta{font-size:11px;color:#ccc;margin-top:4px}

.empty{font-size:13px;color:#ccc;padding:1.5rem 0;text-align:center}
.loading{font-size:13px;color:#ccc;padding:3rem 0;text-align:center}
</style>
</head>
<body>
<div class="card">
  <div class="topbar">
    <span class="app-title">共享代辦清單</span>
    <button class="add-group-btn" onclick="addGroup()">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2"><line x1="6" y1="1" x2="6" y2="11"/><line x1="1" y1="6" x2="11" y2="6"/></svg>
      新增標題
    </button>
  </div>

  <div class="sync-bar">
    <span class="dot" id="sync-dot"></span>
    <span id="sync-label">連線中...</span>
  </div>

  <div class="name-row">
    <span class="name-label">你的名稱：</span>
    <input class="name-input" id="user-name" type="text" placeholder="匿名" maxlength="12">
  </div>

  <div id="groups-container"><div class="loading">載入中...</div></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, update, remove, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBkKAGUnB1YYzlaUHrNFQGZ7UDDWB9KCLQ",
  authDomain: "todo-e6269.firebaseapp.com",
  databaseURL: "https://todo-e6269-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "todo-e6269",
  storageBucket: "todo-e6269.firebasestorage.app",
  messagingSenderId: "892861599023",
  appId: "1:892861599023:web:a77c7e77fa69734dbca5da"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const groupsRef = ref(db, 'groups');

const dot = document.getElementById('sync-dot');
const syncLabel = document.getElementById('sync-label');

function userName(){ return document.getElementById('user-name').value.trim() || '匿名'; }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function now(){ return new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'}); }

let snapshot = {};
// 記住哪些群組是展開的（本機）
let openGroups = new Set(JSON.parse(localStorage.getItem('open_groups')||'[]'));

function saveOpen(){ localStorage.setItem('open_groups', JSON.stringify([...openGroups])); }

onValue(groupsRef, (snap) => {
  dot.className = 'dot online';
  syncLabel.textContent = '即時同步中 — 所有人看到一樣的清單';
  snapshot = snap.val() || {};
  render(snapshot);
}, () => {
  dot.className = 'dot error';
  syncLabel.textContent = '連線失敗，請重新整理';
});

function render(data){
  const groups = Object.entries(data).sort((a,b)=>(a[1].order||0)-(b[1].order||0));
  const container = document.getElementById('groups-container');
  if(!groups.length){
    container.innerHTML = '<div class="empty">按右上角「新增標題」開始</div>';
    return;
  }
  container.innerHTML = groups.map(([gid,g])=>groupHTML(gid,g)).join('');
  groups.forEach(([gid,g])=>{
    const ta = document.getElementById('note-'+gid);
    if(ta){
      ta.value = g.note||'';
      const meta = document.getElementById('note-meta-'+gid);
      if(meta) meta.textContent = g.noteBy ? '最後更新：'+g.noteBy+(g.noteAt?' '+g.noteAt:'') : '';
    }
  });
}

function groupHTML(gid, g){
  const items = Object.entries(g.items||{}).sort((a,b)=>(a[1].order||0)-(b[1].order||0));
  const done = items.filter(([,i])=>i.done).length;
  const total = items.length;
  const pct = total > 0 ? Math.round(done/total*100) : 0;
  const allDone = total > 0 && done === total;
  const isOpen = openGroups.has(gid);
  return `<div class="group${isOpen?' open':''}" id="grp-${gid}">
    <div class="group-header" onclick="toggleGroup(event,'${gid}')">
      <svg class="chevron" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><polyline points="5,3 11,8 5,13"/></svg>
      <input class="group-title" value="${esc(g.title||'')}" placeholder="標題…" maxlength="30"
        onclick="event.stopPropagation()"
        onchange="renameGroup('${gid}',this.value)">
      <span class="group-badge${allDone?' all-done':''}">${done}/${total}</span>
      <button class="del-group-btn" onclick="event.stopPropagation();delGroup('${gid}')">×</button>
    </div>
    <div class="group-mini-bar"><div class="group-mini-fill" style="width:${pct}%"></div></div>
    <div class="group-body">
      <div class="todo-list">
        ${items.length ? items.map(([iid,i])=>itemHTML(gid,iid,i)).join('') : '<div class="empty" style="padding:6px 0">還沒有項目</div>'}
      </div>
      <div class="add-item-row">
        <input class="add-item-input" id="inp-${gid}" type="text" placeholder="新增項目…" maxlength="60"
          onkeydown="if(event.key==='Enter') addItem('${gid}')">
        <button class="add-item-btn" onclick="addItem('${gid}')">新增</button>
      </div>
      <div class="group-note-wrap">
        <div class="group-note-label">目前進度</div>
        <textarea class="group-note" id="note-${gid}" placeholder="寫下這個標題的進度說明…" maxlength="300"
          oninput="onNoteInput('${gid}',this.value)"></textarea>
        <div class="group-note-meta" id="note-meta-${gid}"></div>
      </div>
    </div>
  </div>`;
}

function itemHTML(gid, iid, item){
  return `<div class="todo-item${item.done?' done':''}">
    <button class="check-btn${item.done?' checked':''}" onclick="toggleItem('${gid}','${iid}',${!item.done})">
      <svg class="check-icon" viewBox="0 0 10 10"><polyline points="1.5,5 4,7.5 8.5,2.5"/></svg>
    </button>
    <span class="todo-text">${esc(item.text)}</span>
    <span class="item-meta">${esc(item.by||'')} ${esc(item.at||'')}</span>
    <button class="del-item-btn" onclick="delItem('${gid}','${iid}')">×</button>
  </div>`;
}

window.toggleGroup = function(e, gid){
  if(e.target.classList.contains('group-title')) return;
  const el = document.getElementById('grp-'+gid);
  if(!el) return;
  if(openGroups.has(gid)){ openGroups.delete(gid); el.classList.remove('open'); }
  else { openGroups.add(gid); el.classList.add('open'); }
  saveOpen();
};

const noteDebounces = {};
window.onNoteInput = function(gid, val){
  clearTimeout(noteDebounces[gid]);
  noteDebounces[gid] = setTimeout(async ()=>{
    await update(ref(db,'groups/'+gid), { note: val, noteBy: userName(), noteAt: now() });
  }, 600);
};

window.addGroup = async function(){
  const order = Object.keys(snapshot).length;
  const newRef = await push(groupsRef, { title:'新標題', order, items:{} });
  openGroups.add(newRef.key);
  saveOpen();
  setTimeout(()=>{
    document.querySelectorAll('.group-title').forEach(el=>{
      if(el.value==='新標題'){ el.focus(); el.select(); }
    });
  }, 300);
};

window.renameGroup = async function(gid, val){
  await update(ref(db,'groups/'+gid), { title: val });
};

window.delGroup = async function(gid){
  if(!confirm('確定刪除這個標題和裡面所有項目嗎？')) return;
  openGroups.delete(gid); saveOpen();
  await remove(ref(db,'groups/'+gid));
};

window.addItem = async function(gid){
  const input = document.getElementById('inp-'+gid);
  const text = input.value.trim();
  if(!text) return;
  input.value = '';
  const items = snapshot[gid]?.items || {};
  const order = Object.keys(items).length;
  await push(ref(db,'groups/'+gid+'/items'), {
    text, done:false, by:userName(), at:now(), order
  });
  setTimeout(()=>document.getElementById('inp-'+gid)?.focus(), 100);
};

window.toggleItem = async function(gid, iid, val){
  await update(ref(db,'groups/'+gid+'/items/'+iid), { done: val });
};

window.delItem = async function(gid, iid){
  await remove(ref(db,'groups/'+gid+'/items/'+iid));
};

const savedName = localStorage.getItem('todo_username');
if(savedName) document.getElementById('user-name').value = savedName;
document.getElementById('user-name').addEventListener('input', e=>{
  localStorage.setItem('todo_username', e.target.value);
});
</script>
</body>
</html>
